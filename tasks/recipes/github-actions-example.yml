# Optional: merge into .github/workflows/your-workflow.yml
# Lists paths tagged with both "ci" and "python" (OR semantics: use --match-all for AND).

name: TagManager example

on:
  workflow_dispatch:

jobs:
  tagged-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TagManager
        run: pip install "tagmanager-cli"

      - name: Search by tags (machine-readable)
        run: tm --json search --tags ci python || true
        # Remove "|| true" when you expect matches; exit 1 means no matches.
