# Build sdist/wheel and publish to PyPI when a version tag is pushed (e.g. v1.7.0).
#
# Cut a release from the default branch (after version bump is merged): ./publish.sh release
# (or: gh release create v1.8.0 --title "TagManager v1.8.0" --notes-file release_notes.md)
#
# Auth: PyPI trusted publishing (OIDC). On PyPI: Project → Publishing → Add a
# pending publisher → GitHub → owner DavidTbilisi → repo TagManager → workflow
# release.yml → Environment name **pypi** (must match the GitHub Environment below).
# Requires `id-token: write` and a GitHub Environment named `pypi` (no secrets needed).
#
# Fallback: add repo secret PYPI_API_TOKEN and uncomment `password:` on the publish step.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tagmanager-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Optional: set repo secret PYPI_API_TOKEN to publish without configuring OIDC.
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
