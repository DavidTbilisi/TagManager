name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[test]"

      - name: Run tests with coverage gate
        run: >
          pytest
          --cov=tagmanager
          --cov-report=term:skip-covered
          --cov-fail-under=57
          -q
